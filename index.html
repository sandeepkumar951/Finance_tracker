<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#1a1a24;
  --bg4:#222230;
  --bg5:#2a2a3a;
  --border:rgba(120,100,255,0.1);
  --border2:rgba(120,100,255,0.2);
  --text:#eeeef5;
  --text2:#9090aa;
  --text3:#454560;
  --accent:#7c5cfc;
  --accent2:#9f7ffe;
  --aglow:rgba(124,92,252,0.15);
  --green:#00e5a0;
  --gbg:rgba(0,229,160,0.08);
  --red:#ff4f6a;
  --rbg:rgba(255,79,106,0.08);
  --blue:#4da6ff;
  --r:12px;
  --rl:18px;
  --font:'Montserrat','Segoe UI',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --sw:275px;
  --tw:280px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
body{min-height:100vh}
.shell{display:flex;min-height:100vh}

/* ════════════════════════════
   SIDEBAR
════════════════════════════ */
.sidebar{
  width:var(--sw);flex-shrink:0;
  background:var(--bg2);
  border-right:1px solid var(--border);
  padding:1.5rem 1.1rem;
  display:flex;flex-direction:column;gap:0.3rem;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.main{flex:1;padding:2rem;overflow-x:hidden;min-width:0}

.logo{
  font-size:19px;font-weight:800;
  padding:0.2rem 0.5rem 1.2rem;
  display:flex;align-items:center;gap:10px;letter-spacing:-0.5px
}
.logo-sub{
  font-size:11px;font-weight:500;color:var(--text3);
  display:block;margin-top:2px
}
.nav-lbl{
  font-size:9px;font-weight:800;color:var(--text3);
  letter-spacing:0.14em;text-transform:uppercase;
  padding:0.65rem 0.6rem 0.2rem
}
.nav-btn{
  width:100%;text-align:left;background:transparent;border:none;
  color:var(--text2);font-family:var(--font);font-size:13px;font-weight:600;
  padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:9px
}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--aglow);color:var(--accent2);border:1px solid var(--border2)}
.nav-btn .ni{font-size:15px;width:20px;text-align:center}
.sdiv{height:1px;background:var(--border);margin:0.5rem 0;flex-shrink:0}

/* Pills */
.mpill{
  width:100%;text-align:left;background:transparent;border:none;
  color:var(--text3);font-family:var(--font);font-size:11px;font-weight:600;
  padding:6px 10px;border-radius:8px;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:6px;flex-wrap:wrap
}
.mpill:hover{background:var(--bg3);color:var(--text2)}
.mpill.active{
  background:linear-gradient(135deg,var(--accent),#a855f7);
  color:#fff;font-weight:700
}
.mpill .dot{
  width:5px;height:5px;border-radius:50%;
  background:currentColor;opacity:0.6;flex-shrink:0
}
.mpill-month{white-space:nowrap;flex-shrink:0}

/* Sidebar Pie */
.spie-wrap{
  margin:0.75rem 0.1rem 0;
  background:linear-gradient(145deg,#13131e,#1a1a26);
  border:1px solid var(--border);border-radius:18px;
  padding:1rem 0.9rem;flex-shrink:0;
  box-shadow:0 4px 24px rgba(0,0,0,0.35)
}
.spie-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:0.75rem
}
.spie-title{
  font-size:9px;font-weight:800;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.13em
}
.spie-badge{
  font-size:8px;font-weight:700;color:var(--accent2);
  background:var(--aglow);border:1px solid var(--border2);
  padding:2px 7px;border-radius:10px
}
.spie-canvas-wrap{position:relative;width:100%;aspect-ratio:1/1}
.spie-canvas-wrap canvas{width:100%!important;height:100%!important}
.spie-center{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;width:58%
}
.spie-amt{
  font-size:17px;font-weight:800;font-family:var(--font);
  color:var(--text);letter-spacing:-0.8px;line-height:1.1
}
.spie-lbl{
  font-size:8px;font-weight:600;color:var(--text3);
  letter-spacing:0.1em;text-transform:uppercase;margin-top:4px
}
.spie-legend{display:flex;flex-direction:column;gap:6px;margin-top:0.9rem}
.spl-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.spl-left{display:flex;align-items:center;gap:7px;min-width:0;flex:1}
.spl-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.spl-name{
  font-size:10px;font-weight:600;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.spl-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.spl-val{font-size:10px;font-family:var(--mono);color:var(--text);font-weight:500}
.spl-pct{
  font-size:9px;font-family:var(--mono);color:var(--text3);
  background:var(--bg4);padding:1px 4px;border-radius:4px
}
.spie-empty{
  text-align:center;padding:1.5rem 0;
  font-size:11px;color:var(--text3);font-weight:500
}

/* Add form */
.add-form{display:flex;flex-direction:column;gap:7px;padding:0.5rem 0}
.add-form select{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);font-family:var(--font);
  font-size:12px;font-weight:600;
  padding:8px 10px;border-radius:8px;
  outline:none;cursor:pointer;width:100%;
  appearance:auto;-webkit-appearance:auto
}
.add-form select option{background:var(--bg3);color:var(--text)}
.btn-add{
  background:linear-gradient(135deg,var(--accent),#a855f7);
  color:#fff;border:none;border-radius:10px;padding:10px;
  font-size:13px;font-family:var(--font);cursor:pointer;
  font-weight:700;transition:all 0.15s;width:100%;
  box-shadow:0 4px 14px rgba(124,92,252,0.3)
}
.btn-add:hover{opacity:0.88;transform:translateY(-1px)}

/* Sidebar footer */
.s-footer{
  margin-top:auto;padding-top:0.75rem;
  border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px
}
.s-sync{
  font-size:10px;font-weight:600;color:var(--text3);
  display:flex;align-items:center;gap:5px
}
.s-sync-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);flex-shrink:0;
  box-shadow:0 0 6px var(--green);
  animation:pulse 2s infinite
}

/* ════════════════════════════
   TOP BAR
════════════════════════════ */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.5rem;padding:0.75rem 1.1rem;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;gap:12px;flex-wrap:wrap
}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-greeting{font-size:13px;font-weight:700;color:var(--text)}
.tb-sub{font-size:11px;font-weight:500;color:var(--text3)}
.tb-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.tb-clock{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.tb-time{
  font-size:18px;font-weight:800;
  font-family:var(--mono);color:var(--text);
  letter-spacing:-0.5px;line-height:1
}
.tb-date{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.03em}
.tb-sync{
  display:flex;align-items:center;gap:5px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px
}
.sync-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);flex-shrink:0;
  box-shadow:0 0 6px var(--green);
  animation:pulse 2s infinite
}
@keyframes pulse{
  0%,100%{opacity:1}50%{opacity:0.3}
}
.sync-txt{font-size:10px;font-weight:600;color:var(--text2)}
.sync-val{font-size:10px;font-weight:700;color:var(--green)}

/* ════════════════════════════
   TRACKER LAYOUT
════════════════════════════ */
.tracker-layout{display:flex;gap:1.5rem;align-items:flex-start}
.tracker-content{flex:1;min-width:0}
.txn-panel{
  width:var(--tw);flex-shrink:0;
  position:sticky;top:1rem
}

/* ════════════════════════════
   TRANSACTIONS PANEL
════════════════════════════ */
.txn-wrap{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rl);overflow:hidden;
  max-height:calc(100vh - 160px);
  display:flex;flex-direction:column
}
.txn-hdr{
  padding:12px 14px 10px;border-bottom:1px solid var(--border);
  background:var(--bg3);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between
}
.txn-hdr-title{
  font-size:10px;font-weight:800;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.12em
}
.txn-hdr-count{
  font-size:9px;font-weight:700;color:var(--accent2);
  background:var(--aglow);border:1px solid var(--border2);
  padding:2px 7px;border-radius:8px
}
.txn-list{
  overflow-y:auto;flex:1;padding:6px 0;
  scrollbar-width:thin;scrollbar-color:var(--bg4) transparent
}
.txn-list::-webkit-scrollbar{width:3px}
.txn-list::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.txn-card{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;
  border-bottom:1px solid rgba(120,100,255,0.05);
  transition:background 0.15s;cursor:default
}
.txn-card:last-child{border-bottom:none}
.txn-card:hover{background:rgba(124,92,252,0.04)}
.txn-icon{
  width:32px;height:32px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0
}
.txn-info{flex:1;min-width:0}
.txn-name{
  font-size:11px;font-weight:700;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.txn-meta{display:flex;align-items:center;gap:5px;margin-top:2px}
.txn-date{font-size:9px;font-weight:500;color:var(--text3)}
.txn-bank{
  font-size:8px;font-weight:700;padding:1px 5px;
  border-radius:4px;text-transform:uppercase;letter-spacing:0.05em
}
.txn-bank.hsbc{background:rgba(220,38,38,0.12);color:#f87171}
.txn-bank.sbi{background:rgba(6,182,212,0.12);color:#22d3ee}
.txn-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0}
.txn-amt{font-size:11px;font-weight:800;font-family:var(--mono);color:var(--text)}
.txn-ago{font-size:9px;font-weight:500;color:var(--text3);margin-top:2px}
.txn-empty{
  text-align:center;padding:2rem 1rem;
  color:var(--text3);font-size:11px;font-weight:500
}
.txn-empty-icon{font-size:28px;display:block;margin-bottom:8px}

/* ════════════════════════════
   PAGE HEADER
════════════════════════════ */
.page-header{margin-bottom:1.75rem}
.page-title{
  font-size:26px;font-weight:800;color:var(--text);
  display:flex;align-items:center;gap:10px;letter-spacing:-0.8px
}
.page-sub{font-size:12px;color:var(--text3);margin-top:5px;font-weight:500}
.save-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--green);background:var(--gbg);
  padding:4px 10px;border-radius:20px;
  border:1px solid rgba(0,229,160,0.2);
  opacity:0;transition:opacity 0.3s;margin-left:12px;font-weight:700
}
.save-badge.show{opacity:1}

/* Vtabs */
.vtabs{
  display:flex;gap:4px;margin-bottom:1.75rem;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:4px;width:fit-content;flex-wrap:wrap
}
.vtab{
  background:transparent;border:none;color:var(--text2);
  font-family:var(--font);font-size:13px;font-weight:700;
  padding:7px 18px;border-radius:9px;cursor:pointer;
  transition:all 0.15s;display:flex;align-items:center;gap:6px
}
.vtab:hover{color:var(--text)}
.vtab.active{
  background:linear-gradient(135deg,var(--accent),#a855f7);
  color:#fff;box-shadow:0 4px 12px rgba(124,92,252,0.3)
}

/* Summary cards */
.scards{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:14px;margin-bottom:2rem
}
.scard{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rl);padding:1.1rem 1.25rem;
  transition:all 0.2s;position:relative;overflow:hidden
}
.scard:hover{border-color:var(--border2);transform:translateY(-2px)}
.scard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),#a855f7);
  opacity:0;transition:opacity 0.2s
}
.scard:hover::before{opacity:1}
.scard-icon{font-size:22px;margin-bottom:8px;display:block}
.scard-label{
  font-size:9px;color:var(--text3);font-weight:800;
  letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px
}
.scard-val{
  font-size:20px;font-weight:800;
  font-family:var(--font);letter-spacing:-0.5px
}
.scard-val.green{color:var(--green)}
.scard-val.red{color:var(--red)}
.scard-val.blue{color:var(--blue)}
.scard-sub{font-size:11px;color:var(--text3);margin-top:4px;font-weight:500}

/* Section dividers */
.str{
  display:flex;align-items:center;gap:10px;
  margin-bottom:0.85rem;margin-top:1.5rem
}
.str h3{
  font-size:10px;font-weight:800;color:var(--text2);
  text-transform:uppercase;letter-spacing:0.12em;white-space:nowrap
}
.str::after{content:'';flex:1;height:1px;background:var(--border)}

/* ════════════════════════════
   BALANCE GRID
════════════════════════════ */
.bal-grid{
  display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;
  gap:1px;background:var(--border);border-radius:var(--rl);
  overflow:hidden;border:1px solid var(--border);margin-bottom:0.5rem
}
.bh{
  background:var(--bg3);padding:10px 14px;
  display:flex;align-items:center;gap:8px
}
.bh-logo{
  width:30px;height:20px;object-fit:contain;
  border-radius:3px;flex-shrink:0;
  filter:drop-shadow(0 1px 3px rgba(0,0,0,0.5))
}
.bh-text{display:flex;flex-direction:column;gap:1px}
.bh-name{
  font-size:13px;font-weight:800;color:var(--text);
  letter-spacing:0.02em;font-family:var(--font)
}
.bh-sub{
  font-size:9px;font-weight:600;color:var(--text3);
  letter-spacing:0.06em;text-transform:uppercase
}
.bc{background:var(--bg2);padding:9px 14px;font-size:13px;color:var(--text)}
.bc.lbl{
  color:var(--text2);font-size:12px;
  display:flex;align-items:center;gap:6px;font-weight:600
}
.bc.mono{font-family:var(--mono);font-size:12px;color:var(--text2)}
.bc.tot{background:var(--bg3);font-family:var(--mono);font-size:13px;font-weight:700}
.bc.clos{background:var(--bg4);font-family:var(--mono);font-weight:800;font-size:13px}
.bc.clos.pos{color:var(--green)}
.bc.clos.neg{color:var(--red)}
.bc.auto{color:var(--green);font-family:var(--mono);font-size:12px}
.atag{
  font-size:9px;background:rgba(0,229,160,0.12);
  color:var(--green);border-radius:4px;padding:1px 5px;
  font-weight:800;margin-left:4px
}
.bi{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--mono);font-size:12px;width:100%;padding:0
}
.bi:focus{color:var(--accent2)}
.bi::placeholder{color:var(--text3)}

/* ════════════════════════════
   EXPENSE SECTIONS
════════════════════════════ */
.exp-sec{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rl);overflow:hidden;
  margin-bottom:1.1rem;transition:border-color 0.2s
}
.exp-sec:hover{border-color:var(--border2)}
.exp-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;border-bottom:1px solid var(--border)
}
.ehl{display:flex;align-items:center;gap:10px}
.eht{font-size:13px;font-weight:700;color:var(--text)}
.ehn{font-size:11px;color:var(--text3);margin-left:4px;font-weight:500}
.ehr{font-size:11px;color:var(--text2);display:flex;gap:14px;align-items:center;font-weight:600}
.ehr .ov{color:var(--red)}

table.et{width:100%;border-collapse:collapse;table-layout:fixed}
table.et th{
  font-size:9px;font-weight:800;color:var(--text3);
  padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);
  background:var(--bg3);letter-spacing:0.08em;text-transform:uppercase;
  vertical-align:middle
}
table.et th.r{text-align:right}
table.et td{
  padding:9px 14px;border-bottom:1px solid var(--border);
  color:var(--text);vertical-align:middle
}
table.et tr:last-child td{border-bottom:none}
table.et tr:hover td{background:rgba(124,92,252,0.03)}
table.et td.r{text-align:right}
table.et td.mn{font-family:var(--mono);font-size:12px;color:var(--text2)}
table.et td.tt{font-family:var(--mono);font-size:12px;font-weight:700}

/* Bank header in expense tables */
.eth-bank{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.eth-bank-logo{
  width:24px;height:15px;object-fit:contain;
  border-radius:2px;flex-shrink:0;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))
}
.eth-bank-name{
  font-size:12px;font-weight:800;color:var(--text);
  font-family:var(--font);letter-spacing:0.04em
}

.cn{display:flex;align-items:center;gap:8px;font-weight:500}
.ce{font-size:16px;width:22px;text-align:center}
.ei{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--mono);font-size:12px;
  width:100%;text-align:right;padding:2px 4px;
  border-radius:6px;transition:all 0.15s
}
.ei:focus{background:var(--bg4);color:var(--accent2)}
.ei::placeholder{color:var(--text3)}
.ei.over{color:var(--red);background:var(--rbg)}
.bdg{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:5px;font-weight:700}
.bdg.ok{color:var(--green);background:var(--gbg)}
.bdg.ov{color:var(--red);background:var(--rbg)}
.bdg.nt{color:var(--text3)}

/* ════════════════════════════
   CHARTS
════════════════════════════ */
.cgrid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:1.25rem;margin-bottom:1.25rem
}
.ccrd{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rl);padding:1.25rem;transition:border-color 0.2s
}
.ccrd:hover{border-color:var(--border2)}
.ctitle{
  font-size:10px;font-weight:800;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.11em;margin-bottom:1rem
}
.lrow{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:0.85rem}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-weight:500}
.ldot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.btn-del{
  background:transparent;border:1px solid rgba(255,79,106,0.25);
  color:var(--red);font-family:var(--font);font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:8px;cursor:pointer;transition:all 0.15s;margin-top:1.25rem

<script>

];

// ════════════════════════════════════════

var ST           = {};

var view         = 'tracker';
var aCharts      = [];
var pieChart     = null;

var lastSave     = null;
var debT;
var clockT;

var LOGOS = {
  hsbc: 'https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/HSBC_logo_%282018%29.svg/1200px-HSBC_logo_%282018%29.svg.png',
  sbi:  'https://upload.wikimedia.org/wikipedia/en/thumb/5/58/State_Bank_of_India_logo.svg/800px-State_Bank_of_India_logo.svg.png'
};

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function R(id){ return document.getElementById(id); }

function fmt(v){
  var n = Math.round(v);
  if(n >= 100000) return '\u20B9' + (n/100000).toFixed(1).replace(/\.0$/,'') + 'L';
  if(n >= 1000)   return '\u20B9' + (n/1000).toFixed(1).replace(/\.0$/,'')   + 'K';
  return '\u20B9' + n.toLocaleString('en-IN');
}
function fmtF(v){
  return '\u20B9' + Math.round(v).toLocaleString('en-IN');
}

function getSecs(){
  return DEF_SECS.map(function(s){
    return Object.assign({}, s, {
      rows: s.rows.map(function(r){
        return Object.assign({}, r, {
          target: cTargets[r.id] !== undefined ? cTargets[r.id] : r.target
        });
      })
    });
  });
}

function getTT(){
  var t = 0;
  getSecs().forEach(function(s){ s.rows.forEach(function(r){ t += r.target; }); });
  return t;
}

function sortedKeys(){
  return Object.keys(ST).sort(function(a, b){
    var ap = a.split('-'), bp = b.split('-');
    var ay = parseInt(ap[1]), by = parseInt(bp[1]);
    if(ay !== by) return ay - by;
    return MN.indexOf(ap[0]) - MN.indexOf(bp[0]);
  });
}

function prevKey(key){
  var m = sortedKeys(), i = m.indexOf(key);
  return i > 0 ? m[i-1] : null;
}

function getX(key, rid, acc){
  try{ return parseFloat(ST[key].expenses[rid][acc]) || 0; }
  catch(e){ return 0; }
}

function calcD(key){
  var S = getSecs();
  var inc = (ST[key] && ST[key].income) ? ST[key].income : {};
  var hOB  = parseFloat(inc.ob_hsbc)  || 0;
  var sOB  = parseFloat(inc.ob_sbi)   || 0;
  var hSal = parseFloat(inc.sal_hsbc) || 0;
  var sSal = parseFloat(inc.sal_sbi)  || 0;
  var hOth = parseFloat(inc.oth_hsbc) || 0;
  var sOth = parseFloat(inc.oth_sbi)  || 0;
  var hSp = 0, sSp = 0;
  S.forEach(function(s){ s.rows.forEach(function(r){
    hSp += getX(key, r.id, 'hsbc');
    sSp += getX(key, r.id, 'sbi');
  }); });
  var hA = hOB + hSal + hOth, sA = sOB + sSal + sOth;
  return { hOB:hOB, sOB:sOB, hSal:hSal, sSal:sSal, hOth:hOth, sOth:sOth,
           hA:hA, sA:sA, hSp:hSp, sSp:sSp,
           hC:hA-hSp, sC:sA-sSp, totA:hA+sA, totSp:hSp+sSp };
}

function calc(key){
  var S = getSecs();
  var inc = (ST[key] && ST[key].income) ? ST[key].income : {};
  var prev = prevKey(key), pT = prev ? calcD(prev) : null;
  var hOB  = parseFloat(inc.ob_hsbc)  || (pT ? pT.hC : 0);
  var sOB  = parseFloat(inc.ob_sbi)   || (pT ? pT.sC : 0);
  var hSal = parseFloat(inc.sal_hsbc) || 0;
  var sSal = parseFloat(inc.sal_sbi)  || 0;
  var hOth = parseFloat(inc.oth_hsbc) || 0;
  var sOth = parseFloat(inc.oth_sbi)  || 0;
  var hSp = 0, sSp = 0;
  S.forEach(function(s){ s.rows.forEach(function(r){
    hSp += getX(key, r.id, 'hsbc');
    sSp += getX(key, r.id, 'sbi');
  }); });
  var hA = hOB + hSal + hOth, sA = sOB + sSal + sOth;
  return { hOB:hOB, sOB:sOB, hSal:hSal, sSal:sSal, hOth:hOth, sOth:sOth,
           hA:hA, sA:sA, hSp:hSp, sSp:sSp,
           hC:hA-hSp, sC:sA-sSp, totA:hA+sA, totSp:hSp+sSp };
}

function getInc(key, field){
  var v = 0;
  try{ v = parseFloat(ST[key].income[field]) || 0; }catch(e){}
  if((field === 'ob_hsbc' || field === 'ob_sbi') && !v){
    var p = prevKey(key);
    if(p){ var t = calcD(p); return field === 'ob_hsbc' ? t.hC : t.sC; }
  }
  return v;
}

// ════════════════════════════════════════
//  SAVE / LOAD
// ════════════════════════════════════════
function save(){
  try{
    localStorage.setItem('ft_v3', JSON.stringify({
      state: ST, cTargets: cTargets,
      mBudget: mBudget, logos: LOGOS
    }));
    lastSave = Date.now();
    updateSync();
  }catch(e){}

  var b = R('sbadge');
  if(b){ b.classList.add('show'); setTimeout(function(){ b.classList.remove('show'); }, 2000); }

  // ✅ Firebase save
  db.collection("trackers").doc("finance").set({
    state: ST,
    cTargets: cTargets,
    mBudget: mBudget,
    logos: LOGOS,
    updatedAt: Date.now()
  }).catch(function(err){ console.error("Firebase save error:", err); });
}

function loadState(){
  // Step 1 — Load localStorage instantly
  try{
    var d = localStorage.getItem('ft_v3');
    if(d){
      var p = JSON.parse(d);
      ST = p.state || {};
      cTargets = p.cTargets || {};
      mBudget = p.mBudget || 32000;
      if(p.logos){
        LOGOS.hsbc = p.logos.hsbc || LOGOS.hsbc;
        LOGOS.sbi  = p.logos.sbi  || LOGOS.sbi;
      }
    }
  }catch(e){ ST={}; cTargets={}; mBudget=32000; }

  // Step 2 — Firebase real-time sync
  db.collection("trackers").doc("finance")
    .onSnapshot(function(doc){
      if(doc.exists){
        var p = doc.data();
        ST       = p.state    || {};
        cTargets = p.cTargets || {};
        mBudget  = p.mBudget  || 32000;
        if(p.logos){
          LOGOS.hsbc = p.logos.hsbc || LOGOS.hsbc;
          LOGOS.sbi  = p.logos.sbi  || LOGOS.sbi;
        }
        lastSave = p.updatedAt || null;
        try{ localStorage.setItem('ft_v3', JSON.stringify(p)); }catch(e){}
        updateSync();
        var ms = sortedKeys();
        if(ms.length && (!cur || !ST[cur])) cur = ms[ms.length-1];
        renderAll();
        var st = R('s-sync-txt');
        if(st) st.textContent = '🔥 Synced';
      }
    }, function(err){
      console.error("Firebase error:", err);
      var st = R('s-sync-txt');
      if(st) st.textContent = '⚠️ Offline mode';
    });
}


// ════════════════════════════════════════
//  CLOCK & SYNC
// ════════════════════════════════════════
function updateSync(){
  var el1 = R('sync-val'), el2 = R('s-sync-txt');
  if(!lastSave){
    if(el1) el1.textContent = 'not yet';
    if(el2) el2.textContent = 'Not saved yet';
    return;
  }
  var d = Math.floor((Date.now() - lastSave) / 1000);
  var txt = d < 10 ? 'just now' :
            d < 60 ? d + 's ago' :
            d < 3600 ? Math.floor(d/60) + 'm ago' :
            Math.floor(d/3600) + 'h ago';
  if(el1) el1.textContent = txt;
  if(el2) el2.textContent = 'Synced ' + txt;
}

function startClock(){
  function tick(){
    var now = new Date();
    // Time
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    var s = String(now.getSeconds()).padStart(2,'0');
    var te = R('tb-time');
    if(te) te.textContent = h + ':' + m + ':' + s;
    // Date
    var de = R('tb-date');
    if(de) de.textContent =
      DN[now.getDay()] + ', ' +
      now.getDate() + ' ' +
      MN[now.getMonth()].slice(0,3) + ' ' +
      now.getFullYear();
    // Greeting
    var hr = now.getHours();
    var gr = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
    var ge = R('tb-greeting');
    if(ge) ge.textContent = gr + '!';
    // Sync label
    updateSync();
  }
  tick();
  clockT = setInterval(tick, 1000);
}

// ════════════════════════════════════════
//  SELECTS — ✅ DROPDOWN FIX
//  Uses plain for-loop + createElement
//  NO template literals — copy-paste safe
// ════════════════════════════════════════
function initSelects(){
  var monthNames = [
    'January','February','March','April',
    'May','June','July','August',
    'September','October','November','December'
  ];
  var nowMonth = new Date().getMonth();
  var nowYear  = new Date().getFullYear();

  // Month select
  var ms = R('sel-month');
  if(ms){
    ms.innerHTML = '';
    for(var mi = 0; mi < 12; mi++){
      var mo = document.createElement('option');
      mo.value       = monthNames[mi];
      mo.textContent = monthNames[mi];
      if(mi === nowMonth) mo.selected = true;
      ms.appendChild(mo);
    }
  }

  // Year select — 2024 to 2050
  var ys = R('sel-year');
  if(ys){
    ys.innerHTML = '';
    for(var yr = 2050; yr >= 2024; yr--){
      var yo = document.createElement('option');
      yo.value       = String(yr);
      yo.textContent = String(yr);
      if(yr === nowYear) yo.selected = true;
      ys.appendChild(yo);
    }
  }
}

// ════════════════════════════════════════
//  ADD / DELETE MONTH
// ════════════════════════════════════════
function addMonth(){
  var ms = R('sel-month');
  var ys = R('sel-year');
  if(!ms || !ys) return;
  var m   = ms.value;
  var y   = ys.value;
  if(!m || !y) return;
  var key = m + '-' + y;
  if(!ST[key]) ST[key] = { income:{}, expenses:{} };
  cur = key;
  save();
  renderAll();
}

function delMonth(){
  if(!confirm('Delete ' + cur + '?')) return;
  delete ST[cur];
  save();
  var ms = sortedKeys();
  cur = ms.length ? ms[ms.length-1] : null;
  renderAll();
}

// ════════════════════════════════════════
function mkBankTh(bank, name){

    ? '<img src="' + logo + '" class="eth-bank-logo" alt="' + name + '" onerror="this.style.display=\'none\'"/>'
    : '';

function mkBankBh(bank, name, sub){

    ? '<img src="' + logo + '" class="bh-logo" alt="' + name + '" onerror="this.style.display=\'none\'"/>'
    : '';
  return '<div class="bh">' + li +
    '<div class="bh-text">' +

      '<span class="bh-sub">'  + sub  + '</span>' +
    '</div></div>';
}

// ════════════════════════════════════════
//  SIDEBAR PIE — ALL TIME
// ════════════════════════════════════════
function renderPie(){
  var wrap   = R('spie-section');
  var months = sortedKeys();
  if(!months.length){ wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  var secs   = getSecs();
  var labels = [], data = [], colors = [];
  var ci = 0;
  secs.forEach(function(sec){
    sec.rows.forEach(function(row){
      var v = 0;
      months.forEach(function(k){
        v += getX(k, row.id, 'hsbc') + getX(k, row.id, 'sbi');
      });
      labels.push(row.emoji + ' ' + row.name);
      data.push(v);
      colors.push(ROW_C[ci % ROW_C.length]);
      ci++;
    });
  });

  var total = data.reduce(function(a,v){ return a+v; }, 0);

  var amtEl = R('spie-amt');
  if(amtEl) amtEl.textContent = total > 0 ? fmt(total) : '\u20B90';

  var legEl = R('spie-legend');
  if(total === 0){
    legEl.innerHTML = '<div class="spie-empty">No expenses yet</div>';
  } else {
    var ranked = [];
    for(var i = 0; i < labels.length; i++){
      if(data[i] > 0) ranked.push({
        l: labels[i], v: data[i], c: colors[i],
        p: ((data[i]/total)*100).toFixed(0)
      });
    }

function getRowIdx(rowId){
  var idx = 0, found = false;
  getSecs().forEach(function(sec){
    sec.rows.forEach(function(row){
      if(!found){ if(row.id === rowId) found = true; else idx++; }
    });
  });
  return idx;
}

function timeAgo(month, year){
  var now = new Date();
  var d = (now.getFullYear() - parseInt(year)) * 12 +
          (now.getMonth() - MN.indexOf(month));
  if(d <= 0) return 'This month';
  if(d === 1) return 'Last month';
  return d + 'mo ago';
}

function getTxns(limit){
  var txns = [];
  var secs  = getSecs();
  var months = sortedKeys();
  months.forEach(function(k){
    var parts = k.split('-');
    secs.forEach(function(sec){
      sec.rows.forEach(function(row){
        var accs = ['hsbc', 'sbi'];
        accs.forEach(function(acc){
          var v = getX(k, row.id, acc);
          if(v > 0){
            txns.push({
              name:  row.name,
              emoji: row.emoji,
              color: ROW_C[getRowIdx(row.id)],
              sec:   sec.color,
              acc:   acc,
              amt:   v,
              month: parts[0],
              year:  parts[1]
            });
          }
        });
      });
    });
  });
  txns.sort(function(a, b){
    var ai = months.indexOf(a.month + '-' + a.year);
    var bi = months.indexOf(b.month + '-' + b.year);
    if(bi !== ai) return bi - ai;
    return b.amt - a.amt;
  });
  return limit ? txns.slice(0, limit) : txns;
}

function renderTxns(){
  var panel = R('txn-inner');
  if(!panel) return;
  var txns = getTxns(50);

  var countEl = R('txn-count');
  if(countEl) countEl.textContent = getTxns(0).length;

  if(!txns.length){
    panel.innerHTML =
      '<div class="txn-empty">' +
        '<span class="txn-empty-icon">💸</span>' +
        'No transactions yet' +
      '</div>';
    return;
  }

  var h = '';
  txns.forEach(function(tx){
    var ago = timeAgo(tx.month, tx.year);
    h +=
      '<div class="txn-card">' +
        '<div class="txn-icon" style="background:' + tx.sec + '18">' +
          tx.emoji +
        '</div>' +
        '<div class="txn-info">' +
          '<div class="txn-name">' + tx.name + '</div>' +
          '<div class="txn-meta">' +
            '<span class="txn-date">' + tx.month.slice(0,3) + ' ' + tx.year + '</span>' +
            '<span class="txn-bank ' + tx.acc + '">' + tx.acc.toUpperCase() + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="txn-right">' +
          '<span class="txn-amt">' + fmtF(tx.amt) + '</span>' +
          '<span class="txn-ago">' + ago + '</span>' +
        '</div>' +
      '</div>';
  });
  panel.innerHTML = h;
}

function renderPills(){

      s.rows.forEach(function(r){ spent += getX(k, r.id, 'hsbc') + getX(k, r.id, 'sbi'); });

      '<span class="dot"></span>' +

  var rows = [

    { lbl:'💰 Salary received',  hv:hSal, sv:sSal, hk:'sal_hsbc', sk:'sal_sbi', auto:false  },

function uploadLogo(bank, input){
  if(!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e){
    LOGOS[bank] = e.target.result;
    var img = R(bank + '-img');
    if(img){ img.src = e.target.result; img.style.opacity = '1'; }
    save();
    if(view === 'tracker' && cur){ buildBal(calc(cur)); buildExp(); }
  };
  reader.readAsDataURL(input.files[0]);
}

function handleSettingsInput(e){
  var t = e.target;
  if(t.id === 'budget-inp'){
    mBudget = parseFloat(t.value) || 32000;
  } else if(t.dataset.rid){
    var v = parseFloat(t.value), def = 0;
    DEF_SECS.forEach(function(s){
      s.rows.forEach(function(r){ if(r.id === t.dataset.rid) def = r.target; });
    });
    if(v && v !== def) cTargets[t.dataset.rid] = v;
    else delete cTargets[t.dataset.rid];
  }
  save();
  var ok = R('set-ok');
  if(ok){ ok.style.opacity = '1'; setTimeout(function(){ ok.style.opacity = '0'; }, 1500); }
}

function resetTargets(){
  if(!confirm('Reset all targets to defaults?')) return;
  cTargets = {}; mBudget = 32000; save();
  renderSettings(R('app'));
}

  if(t.classList.contains('bi')){
    if(!ST[cur].income) ST[cur].income = {};
    ST[cur].income[t.dataset.inc] = parseFloat(t.value) || 0;
    recalcBal();
  } else if(t.classList.contains('ei')){
    var sec = t.dataset.sec, row = t.dataset.row, acc = t.dataset.acc;
    if(!ST[cur].expenses)          ST[cur].expenses          = {};
    if(!ST[cur].expenses[row])     ST[cur].expenses[row]     = {};
    ST[cur].expenses[row][acc] = parseFloat(t.value) || 0;
    recalcExp(sec, row);
    recalcBal();
    renderPie();
    renderPills();
    renderTxns();
  }
  clearTimeout(debT);
  debT = setTimeout(save, 600);
}

function recalcBal(){
  var t = calc(cur), TT = getTT();
  [['ob_hsbc','ob_sbi'],['sal_hsbc','sal_sbi'],['oth_hsbc','oth_sbi']].forEach(function(p){
    var hv = getInc(cur,p[0]), sv = getInc(cur,p[1]);
    var el = R('comb-' + p[0]);
    if(el) el.textContent = (hv+sv) > 0 ? fmtF(hv+sv) : '—';
  });
  [['h-avail',t.hA],['s-avail',t.sA],['c-avail',t.totA],
   ['h-spent',t.hSp],['s-spent',t.sSp],['c-spent',t.totSp]].forEach(function(f){
    var el = R(f[0]); if(el) el.textContent = fmtF(f[1]);
  });
  var hc=R('h-close'), sc=R('s-close'), cc=R('c-close');
  if(hc){ hc.textContent=fmtF(t.hC);     hc.className='bc clos '+(t.hC>=0?'pos':'neg'); }
  if(sc){ sc.textContent=fmtF(t.sC);     sc.className='bc clos '+(t.sC>=0?'pos':'neg'); }
  if(cc){ cc.textContent=fmtF(t.hC+t.sC);cc.className='bc clos '+((t.hC+t.sC)>=0?'pos':'neg'); }
  var cards = document.querySelectorAll('.scard-val');
  if(cards[0]) cards[0].textContent = fmtF(t.totA);
  if(cards[2]){
    cards[2].textContent = fmtF(t.totSp);
    cards[2].className   = 'scard-val' + (t.totSp > TT ? ' red' : '');
  }
  var rem = TT - t.totSp;
  if(cards[3]){
    cards[3].textContent = fmtF(Math.abs(rem));
    cards[3].className   = 'scard-val' + (rem >= 0 ? ' green' : ' red');
  }
}

function recalcExp(secId, rowId){
  var secs = getSecs(), row = null;
  secs.forEach(function(s){ s.rows.forEach(function(r){ if(r.id===rowId) row=r; }); });
  if(!row) return;

  var hv   = getX(cur,rowId,'hsbc'), sv = getX(cur,rowId,'sbi');
  var tot  = hv + sv, diff = tot - row.target;
  var tEl  = R('tot-'  + secId + '-' + rowId);
  var dEl  = R('diff-' + secId + '-' + rowId);
  var hI   = document.querySelector('[data-row="'+rowId+'"][data-acc="hsbc"]');
  var sI   = document.querySelector('[data-row="'+rowId+'"][data-acc="sbi"]');

  if(tEl) tEl.textContent = tot > 0 ? fmtF(tot) : '—';
  if(hI)  hI.classList.toggle('over', tot > row.target && hv > 0);
  if(sI)  sI.classList.toggle('over', tot > row.target && sv > 0);
  if(dEl){
    if(tot===0)     dEl.innerHTML = '<span class="bdg nt">—</span>';
    else if(diff>0) dEl.innerHTML = '<span class="bdg ov">+' + fmtF(diff) + '</span>';
    else            dEl.innerHTML = '<span class="bdg ok">'  + fmtF(diff) + '</span>';
  }

  var sec = null;
  secs.forEach(function(s){ if(s.id===secId) sec=s; });
  if(sec){
    var sA=0, sT=0;
    sec.rows.forEach(function(r){
      sA += getX(cur,r.id,'hsbc') + getX(cur,r.id,'sbi');
      sT += r.target;
    });
    var el = R('sa-' + secId);
    if(el){ el.textContent = 'Actual: ' + fmtF(sA); el.className = sA>sT?'ov':''; }
  }
}

// ════════════════════════════════════════
//  CHARTS
// ════════════════════════════════════════
function renderCharts(app){
  var secs   = getSecs();
  var months = sortedKeys();
  if(!months.length){
    app.innerHTML = '<div class="empty"><span class="empty-icon">📊</span><h3>No data yet</h3></div>';
    return;
  }
  if(!cur || !ST[cur]) cur = months[months.length-1];
  var parts = cur.split('-'), m = parts[0], y = parts[1], TT = getTT();

  app.innerHTML =
    '<div class="page-header">' +
      '<div class="page-title">📈 Charts</div>' +
      '<div class="page-sub">' + m + ' ' + y + ' · spending breakdown & trends</div>' +
    '</div>' +
    '<div class="vtabs">' +
      '<button class="vtab" onclick="setView(\'tracker\')">📊 Tracker</button>' +
      '<button class="vtab active" onclick="setView(\'charts\')">📈 Charts</button>' +
      '<button class="vtab" onclick="setView(\'settings\')">⚙️ Settings</button>' +
    '</div>' +
    '<div class="cgrid" id="cg"></div>' +
    '<div class="ccrd" style="margin-bottom:1.25rem">' +
      '<div class="ctitle">📅 All months — spending vs target</div>' +
      '<div class="lrow">' +
        '<span class="leg"><span class="ldot" style="background:#1e1e2e"></span>Target</span>' +
        '<span class="leg"><span class="ldot" style="background:#8B5CF6"></span>Actual</span>' +
        '<span class="leg"><span class="ldot" style="background:#ff4f6a"></span>Over</span>' +
      '</div>' +
      '<div style="position:relative;height:' + Math.max(200,months.length*44+60) + 'px">' +
        '<canvas id="ca"></canvas>' +
      '</div>' +
    '</div>';

  var cg = R('cg');

  secs.forEach(function(sec){
    var col     = SEC_C[sec.id];
    var labels  = sec.rows.map(function(r){ return r.emoji + ' ' + r.name; });
    var targets = sec.rows.map(function(r){ return r.target; });
    var actuals = sec.rows.map(function(r){
      return getX(cur, r.id, 'hsbc') + getX(cur, r.id, 'sbi');
    });
    var card = document.createElement('div');
    card.className = 'ccrd';
    card.innerHTML =
      '<div class="ctitle">' + sec.icon + ' ' + sec.title + '</div>' +
      '<div class="lrow">' +
        '<span class="leg"><span class="ldot" style="background:#1e1e2e"></span>Target</span>' +
        '<span class="leg"><span class="ldot" style="background:' + col + '"></span>Actual</span>' +
      '</div>' +
      '<div style="position:relative;height:' + (sec.rows.length*46+60) + 'px">' +
        '<canvas id="c-' + sec.id + '"></canvas>' +
      '</div>';
    cg.appendChild(card);
    aCharts.push(new Chart(R('c-' + sec.id), {
      type:'bar',
      data:{
        labels:labels,
        datasets:[
          { label:'Target', data:targets, backgroundColor:'#1e1e2e',
            borderRadius:6, barPercentage:0.6, categoryPercentage:0.75 },
          { label:'Actual', data:actuals,
            backgroundColor:actuals.map(function(v,i){ return v>targets[i]?'#ff4f6a':col; }),
            borderRadius:6, barPercentage:0.6, categoryPercentage:0.75 }
        ]
      },
      options:{
        indexAxis:'y', responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:function(c){ return fmtF(c.raw); }}}
        },
        scales:{
          x:{
            ticks:{color:'#454560',
              callback:function(v){ return v>=1000?'\u20B9'+(v/1000)+'k':'\u20B9'+v; },
              font:{size:10,family:'Montserrat,sans-serif'}},
            grid:{color:'rgba(120,100,255,0.05)'}
          },
          y:{
            ticks:{color:'#9090aa', font:{size:11,family:'Montserrat,sans-serif'}},
            grid:{display:false}
          }
        }
      }
    }));
  });

  // Spending breakdown doughnut
  var secA = secs.map(function(sec){
    return sec.rows.reduce(function(a,r){
      return a + getX(cur,r.id,'hsbc') + getX(cur,r.id,'sbi');
    }, 0);
  });
  var gA = secA.reduce(function(a,v){ return a+v; }, 0);

  var dCard = document.createElement('div');
  dCard.className = 'ccrd';
  var dLeg = secs.map(function(s,i){
    var pct = gA > 0 ? ((secA[i]/gA)*100).toFixed(0) + '%' : '0%';
    return '<span class="leg"><span class="ldot" style="background:' +
      Object.values(SEC_C)[i] + '"></span>' + s.icon + ' ' + pct + '</span>';
  }).join('');
  dCard.innerHTML =
    '<div class="ctitle">🍩 Spending breakdown</div>' +
    '<div class="lrow">' + dLeg + '</div>' +
    '<div style="position:relative;height:220px"><canvas id="cdnt"></canvas></div>';
  cg.appendChild(dCard);
  aCharts.push(new Chart(R('cdnt'), {
    type:'doughnut',
    data:{
      labels: secs.map(function(s){ return s.title; }),
      datasets:[{
        data: secA,
        backgroundColor: Object.values(SEC_C),
        borderWidth:3, borderColor:'#0a0a0f', hoverOffset:10
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(c){ return c.label+': '+fmtF(c.raw); }}}
      }
    }
  }));

  // HSBC vs SBI
  var hT = secs.reduce(function(a,s){
    return a + s.rows.reduce(function(b,r){ return b + getX(cur,r.id,'hsbc'); }, 0);
  }, 0);
  var sT = secs.reduce(function(a,s){
    return a + s.rows.reduce(function(b,r){ return b + getX(cur,r.id,'sbi'); }, 0);
  }, 0);
  var aCard = document.createElement('div');
  aCard.className = 'ccrd';
  aCard.innerHTML =
    '<div class="ctitle">🏦 HSBC vs SBI</div>' +
    '<div class="lrow">' +
      '<span class="leg"><span class="ldot" style="background:#4da6ff"></span>HSBC ' + fmtF(hT) + '</span>' +
      '<span class="leg"><span class="ldot" style="background:#10B981"></span>SBI '  + fmtF(sT) + '</span>' +
    '</div>' +
    '<div style="position:relative;height:220px"><canvas id="cacc"></canvas></div>';
  cg.appendChild(aCard);
  aCharts.push(new Chart(R('cacc'), {
    type:'doughnut',
    data:{
      labels:['HSBC','SBI'],
      datasets:[{
        data:[hT,sT],
        backgroundColor:['#4da6ff','#10B981'],
        borderWidth:3, borderColor:'#0a0a0f', hoverOffset:10
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false, cutout:'68%',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(c){ return c.label+': '+fmtF(c.raw); }}}
      }
    }
  }));

  // All months bar
  var allL = months.map(function(k){
    var p = k.split('-'); return p[0].slice(0,3) + ' ' + p[1];
  });
  var allA = months.map(function(k){
    return secs.reduce(function(a,sec){
      return a + sec.rows.reduce(function(b,r){
        return b + getX(k,r.id,'hsbc') + getX(k,r.id,'sbi');
      }, 0);
    }, 0);
  });
  aCharts.push(new Chart(R('ca'), {
    type:'bar',
    data:{
      labels: allL,
      datasets:[
        { label:'Target',
          data: months.map(function(){ return TT; }),
          backgroundColor:'#1a1a28',
          borderRadius:6, barPercentage:0.5, categoryPercentage:0.75 },
        { label:'Actual',
          data: allA,
          backgroundColor: allA.map(function(v){ return v>TT?'#ff4f6a':'#8B5CF6'; }),
          borderRadius:6, barPercentage:0.5, categoryPercentage:0.75 }
      ]
    },
    options:{
      indexAxis:'y', responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:function(c){ return fmtF(c.raw); }}}
      },
      scales:{
        x:{
          ticks:{color:'#454560',
            callback:function(v){ return v>=1000?'\u20B9'+(v/1000)+'k':'\u20B9'+v; },
            font:{size:10,family:'Montserrat,sans-serif'}},
          grid:{color:'rgba(120,100,255,0.05)'}
        },
        y:{
          ticks:{color:'#9090aa', font:{size:11,family:'Montserrat,sans-serif'}},
          grid:{display:false}
        }
      }
    }
  }));
}

// ════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════
loadState();
initSelects();

// Safety check — rebuild dropdowns if empty
var msChk = R('sel-month');
var ysChk = R('sel-year');
if(msChk && msChk.options.length === 0) initSelects();
if(ysChk && ysChk.options.length === 0) initSelects();

startClock();

var bootMs = sortedKeys();
if(bootMs.length) cur = bootMs[bootMs.length-1];

renderAll();
</script>
